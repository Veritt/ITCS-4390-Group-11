<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
  <title>Restaurant Menu</title>
</head>
<body>
    <div class="restaurant-menu">
        <!-- Top Bar -->
        <header class="top-bar">
            <img class="topbar-logo" src="../photos/loggg-30.png" alt="UNC Charlotte Dining Logo">
            <img class="dark-mode-icon" src="../photos/dark-mode-button0.svg" alt="Dark Mode">
            <img class="menu-icon" src="../photos/pajamas-hamburger0.svg" alt="Menu">
        </header>

        <!-- Main Content -->
        <main class="menu-content">
            <!-- Header Block -->
            <div class="header-block">
                <img class="header-logo" src="../photos/rectangle-400.svg" alt="Bojangles Logo">

                <div class="header-text">
                    <h1 class="bojangles">Bojangles</h1>
                    <p class="student-union">Student Union</p>
                </div>
            </div>

            <!-- Menu Card -->
            <a class="menu-card" href="./meals.html">
                <div class="menu-card-left">
                    <img class="menu-card-image" src="../photos/screenshot-2026-03-23-at-2-59-18-pm-10.png" alt="Meal Preview">
                    <div class="menu-card-title">Meals</div>
                </div>

                <img class="menu-card-arrow" src="../photos/group-230.svg" alt="Go to Meals">
            </a>
        </main>
    </div>
</body>
</html>
