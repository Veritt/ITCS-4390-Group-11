<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <script src="../../script.js" defer></script>
  <title>Customize your Beverage</title>
   
</head>
<body>
    <div class="restaurant-menu">
        <header class="top-bar">
        <a href="../index.html" class="topbar-logo">
            <img src="../../pictures/charlotte-logo.png" alt="UNC Charlotte Dining Logo">
        </a>

        <nav class="desktop-nav">
            <a href="../index.html">Home</a>
            <a href="../profile.html">Profile</a>
            <a href="../paymentMethod.html">Payment Method</a>
            <a href="../pastOrders.html">Past Orders</a>
        </nav>

        <img class="dark-mode-icon" src="../../pictures/dark-mode-button.svg" />
        <img class="menu-icon" id="menuOpen" src="../../pictures/hamburger-menu-icon.svg" alt="Menu">
      </header>
    

    <div class="menu-overlay" id="menuOverlay"></div>

    <aside class="side-menu" id="sideMenu">
      <button class="menu-close" id="menuClose">
        <img src="../../pictures/close-icon.svg" alt="Close">
      </button>

      <nav class="side-menu-nav">
        <a href="../index.html" class="side-menu-link">
          <img src="../../pictures/home-icon.svg" alt="Homepage">
          <span>Homepage</span>
        </a>

        <a href="../profile.html" class="side-menu-link">
          <img src="../../pictures/profile-icon.svg" alt="Profile">
          <span>Profile</span>
        </a>

        <a href="../paymentMethod.html" class="side-menu-link">
          <img src="../../pictures/payment-icon.svg" alt="Payment Method">
          <span>Payment Method</span>
        </a>

        <a href="../pastOrders.html" class="side-menu-link">
          <img src="../../pictures/orders-icon.svg" alt="Past Orders">
          <span>Past Orders</span>
        </a>
      </nav>
    </aside>
    
  <!-- MAIN -->
  <main class="selection-page beverage-size-page">

    <div class="selection-topbar">
      <a href="../subway/DrinkSelection.html" class="back-link">
          <img src="../../pictures/back-arrow-icon.svg" class="back-icon">
          <span>Back</span>
        </a>
      <h1 class="selection-page-title">Customize your Beverage</h1>
    </div>

    <div class="drink-size-layout">

      <!-- LEFT -->
      <div class="drink-left">
        <div class="drink-img-box">
         <img src="../../pictures/subwaydrink.jpg" alt="Fountain Drink">
        </div>

        <h2 class="drink-name">Fountain Drink</h2>
        <p class="drink-meta">$2.99 | 220 cal</p>
      </div>

      <!-- RIGHT -->
      <div class="drink-right">

        <div class="size-section">
          <h3>Size Options:</h3>

          <div class="size-toggle">
            <a href="../subway/ReviewPage.html" class="size-option">S</a>
            <a href="../subway/ReviewPage.html" class="size-option">M</a>
            <a href="../subway/ReviewPage.html" class="size-option">L</a>
          </div>
        </div>

        <div class="includes-section">
          <h3>Your Drink Includes:</h3>

          <input class="includes-box" type="text">
          </div>
        </div>

        <a href="../subway/ReviewPage.html" class="next-btn">
          Review Your Meal
        </a>

      </div>

    </div>

  </main>

</div>

</body>
</html>
