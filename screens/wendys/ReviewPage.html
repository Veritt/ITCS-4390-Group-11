<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../style.css">
  <script src="../../script.js" defer></script>
  <title>Review your meal</title>
</head>

<body>
    <div class="restaurant-menu">
        <header class="top-bar">
        <a href="../index.html" class="topbar-logo">
            <img src="../../pictures/charlotte-logo.png" alt="UNC Charlotte Dining Logo">
        </a>

        <nav class="desktop-nav">
            <a href="../index.html">Home</a>
            <a href="../profile.html">Profile</a>
            <a href="../paymentMethod.html">Payment Method</a>
            <a href="../pastOrders.html">Past Orders</a>
        </nav>

        <img class="dark-mode-icon" src="../../pictures/dark-mode-button.svg" />
        <img class="menu-icon" id="menuOpen" src="../../pictures/hamburger-menu-icon.svg" alt="Menu">
      </header>
    

    <div class="menu-overlay" id="menuOverlay"></div>

    <aside class="side-menu" id="sideMenu">
      <button class="menu-close" id="menuClose">
        <img src="../../pictures/close-icon.svg" alt="Close">
      </button>

      <nav class="side-menu-nav">
        <a href="../index.html" class="side-menu-link">
          <img src="../../pictures/home-icon.svg" alt="Homepage">
          <span>Homepage</span>
        </a>

        <a href="../profile.html" class="side-menu-link">
          <img src="../../pictures/profile-icon.svg" alt="Profile">
          <span>Profile</span>
        </a>

        <a href="../paymentMethod.html" class="side-menu-link">
          <img src="../../pictures/payment-icon.svg" alt="Payment Method">
          <span>Payment Method</span>
        </a>

        <a href="../pastOrders.html" class="side-menu-link">
          <img src="../../pictures/orders-icon.svg" alt="Past Orders">
          <span>Past Orders</span>
        </a>
      </nav>
    </aside>

  <!-- MAIN -->
  <main class="review-page">

    <!-- TOP SECTION -->
    <div class="selection-topbar">
      <a href="../wendys/DrinkSelectionSize.html" class="back-link">
        <img src="../../pictures/back-arrow-icon.svg" class="back-icon">
        <span>Back</span>
      </a>

      <h1 class="selection-page-title">Review your meal</h1>
    </div>

    <div class="review-layout">

      <!-- LEFT: ITEMS -->
      <div class="review-left">

        <!-- ITEM -->
        <div class="review-item">
          <img src="../../pictures/baconator.png" class="review-img">

          <div class="review-info">
            <h3>Baconator</h3>
            <p>960 cal</p>
          </div>

          <a href="#" class="edit-link">Edit</a>
        </div>

        <hr>

        <div class="review-item">
          <img src="../../pictures/wendys-fries.png" class="review-img">

          <div class="review-info">
            <h3>Medium Fries</h3>
            <p>470 cal</p>
          </div>

          <a href="#" class="edit-link">Edit</a>
        </div>

        <hr>

        <div class="review-item">
          <img src="../../pictures/coca-cola.png" class="review-img">

          <div class="review-info">
            <h3>Medium Coca-Cola</h3>
            <p>200 cal</p>
          </div>

          <a href="#" class="edit-link">Edit</a>
        </div>

      </div>

      <!-- RIGHT: SUMMARY -->
      <div class="review-right">

        <h2 class="review-title">Baconator Meal</h2>
        <p class="review-meta">$13.05 | 1,630 cal</p>

        <!-- quantity -->
        <div class="qty-box">
          <button>-</button>
          <span>1</span>
          <button>+</button>
        </div>

        <!-- totals -->
        <div class="price-box">
          <p>Subtotal: $13.05</p>
          <p>Tax: $0.91</p>
          <hr>
          <p class="total">Total: $13.96</p>
        </div>

        <a href="../wendys/ConfirmationOrder.html" class="checkout-btn">Go to Checkout</a>

      </div>

    </div>

  </main>

</div>

</body>
</html>
