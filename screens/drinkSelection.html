<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Beverage Selection</title>
</head>
<body>
  <div class="restaurant-menu">

    <!-- TOP BAR -->
    <header class="top-bar">
      <img class="topbar-logo" src="../pictures/charlotte-logo.png">
      <img class="dark-mode-icon" src="../pictures/dark-mode-button.svg">
      <img class="menu-icon" src="../pictures/hamburger-menu-icon.svg">
    </header>

    <!-- MAIN -->
    <main class="selection-page beverage-page">

      <div class="selection-topbar">
        <a href="./sideSizeSelection.html" class="back-link">
          <img src="../pictures/back-arrow-icon.svg" class="back-icon">
          <span>Back</span>
        </a>

        <h1 class="selection-page-title">Which beverage would you like?</h1>
      </div>

      <!-- CENTER CARD -->
      <div class="beverage-container">
        <a href="./drinkSelectionSize.html" class="beverage-card">
          <img src="../pictures/sweet-tea.png" alt="Sweet Tea">
        </a>

        <p class="beverage-label">Sweet Tea</p>
      </div>

    </main>

  </div>
</body>
</html>
