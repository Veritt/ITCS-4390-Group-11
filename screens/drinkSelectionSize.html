<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <script src="../script.js" defer></script>
  <title>Customize your Beverage</title>
   
</head>
<body>

<div class="restaurant-menu">


  <!-- TOP BAR -->
  <header class="top-bar">
    <img class="topbar-logo" src="../pictures/charlotte-logo.png">
    <img class="dark-mode-icon" src="../pictures/dark-mode-button.svg">
    <img class="menu-icon" src="../pictures/hamburger-menu-icon.svg">
  </header>
    <img class="menu-icon" id="menuOpen" src="../pictures/hamburger-menu-icon.svg">
  </header>

  <div class="menu-overlay" id="menuOverlay"></div>

    <aside class="side-menu" id="sideMenu" aria-hidden="true">
        <button class="menu-close" id="menuClose" aria-label="Close menu">
            <img src="../pictures/close-icon.svg" alt="Close">
        </button>

        <nav class="side-menu-nav">
            <a href="./index.html" class="side-menu-link">
            <img src="../pictures/home-icon.svg" alt="Homepage">
            <span>Homepage</span>
            </a>

            <a href="./profile.html" class="side-menu-link">
            <img src="../pictures/profile-icon.svg" alt="Profile">
            <span>Profile</span>
            </a>

            <a href="./paymentMethod.html" class="side-menu-link">
            <img src="../pictures/payment-icon.svg" alt="Payment Method">
            <span>Payment Method</span>
            </a>

            <a href="./pastOrders.html" class="side-menu-link">
            <img src="../pictures/orders-icon.svg" alt="Past Orders">
            <span>Past Orders</span>
            </a>
        </nav>
    </aside>
  
  <!-- MAIN -->
  <main class="selection-page beverage-size-page">

    <div class="selection-topbar">
      <a href="./drinkSelection.html" class="back-link">  ← Back </a>
</a>
      <h1 class="selection-page-title">Customize your Beverage</h1>
    </div>

    <div class="drink-size-layout">

      <!-- LEFT -->
      <div class="drink-left">
        <div class="drink-img-box">
         <img src="../pictures/sweet-tea.png" alt="Sweet Tea">
        </div>

        <h2 class="drink-name">Sweet Tea</h2>
        <p class="drink-meta">$9.43 meal price | 420 cal</p>
      </div>

      <!-- RIGHT -->
      <div class="drink-right">

        <div class="size-section">
          <h3>Size Options:</h3>

          <div class="size-toggle">
            <a href="#" class="size-option">S</a>
            <a href="#" class="size-option selected-size">M</a>
            <a href="#" class="size-option">L</a>
          </div>
        </div>

        <div class="includes-section">
          <h3>Your Lemonade Includes:</h3>

          <div class="includes-box">
            No Customization
          </div>
        </div>

        <a href="ReviewPage.html" class="next-btn">
          Next, choose a beverage
        </a>

      </div>

    </div>

  </main>

</div>

</body>
</html>
