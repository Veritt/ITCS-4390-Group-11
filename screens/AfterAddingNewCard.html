<!doctype html>
<html lang="en">
  <head>
       <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Saved Cards</title>
  </head>

  <body>
    <div class="restaurant-menu">

      <!-- TOP BAR -->
      <header class="top-bar">
        <img class="topbar-logo" src="../pictures/charlotte-logo.png" />
        <img class="dark-mode-icon" src="../pictures/dark-mode-button.svg" />
        <img class="menu-icon" src="../pictures/hamburger-menu-icon.svg" />
      </header>

      <!-- PAGE CONTENT -->
      <div class="card-page">

        <h2>Saved Cards</h2>

        <div class="saved-cards-grid">

          <!-- CARD 1 -->
          <div class="saved-card">
            <img class="brand" src="../pictures/visa.png" />
            <div class="masked">•••• •••• ••••</div>
            <div class="last4">1234</div>
            <div class="exp">Exp 02/28</div>
            <img class="delete" src="../pictures/trash.svg" />
          </div>

          <!-- CARD 2 -->
          <div class="saved-card">
            <img class="brand" src="../pictures/visa.png" />
            <div class="masked">•••• •••• ••••</div>
            <div class="last4">1467</div>
            <div class="exp">Exp 01/28</div>
            <img class="delete" src="../pictures/trash.svg" />
          </div>

        </div>

        <!-- ADD NEW CARD BUTTON -->
        <button class="add-card-btn">
          <img src="../pictures/flowbite-plus-outline0.svg" />
          Add New Card
        </button>

        <!-- FORM -->
        <form class="card-form">
          <div>
            <label>Name on Card</label>
            <input type="text" placeholder="Full Name" />
          </div>

          <div>
            <label>Card Number</label>
            <input type="text" placeholder="Enter card number" />
          </div>

          <div class="form-row">
            <div class="half">
              <label>Expiration Date</label>
              <input type="text" placeholder="MM / YY" />
            </div>
            <div class="half">
              <label>CVC</label>
              <input type="text" placeholder="CVC" />
            </div>
          </div>

          <button class="save-card-btn">Save Card</button>
        </form>

      </div>
    </div>
  </body>
</html>
