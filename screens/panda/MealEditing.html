<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <script src="../../script.js" defer></script>
    <title>Meal Editing</title>
</head>
<body>
    <div class="restaurant-menu">
        <header class="top-bar">
        <a href="../index.html" class="topbar-logo">
            <img src="../../pictures/charlotte-logo.png" alt="UNC Charlotte Dining Logo">
        </a>

        <nav class="desktop-nav">
            <a href="../index.html">Home</a>
            <a href="../profile.html">Profile</a>
            <a href="../paymentMethod.html">Payment Method</a>
            <a href="../pastOrders.html">Past Orders</a>
        </nav>

        <img class="dark-mode-icon" src="../../pictures/dark-mode-button.svg" />
        <img class="menu-icon" id="menuOpen" src="../../pictures/hamburger-menu-icon.svg" alt="Menu">
      </header>
    

    <div class="menu-overlay" id="menuOverlay"></div>

    <aside class="side-menu" id="sideMenu">
      <button class="menu-close" id="menuClose">
        <img src="../../pictures/close-icon.svg" alt="Close">
      </button>

      <nav class="side-menu-nav">
        <a href="../index.html" class="side-menu-link">
          <img src="../../pictures/home-icon.svg" alt="Homepage">
          <span>Homepage</span>
        </a>

        <a href="../profile.html" class="side-menu-link">
          <img src="../../pictures/profile-icon.svg" alt="Profile">
          <span>Profile</span>
        </a>

        <a href="../paymentMethod.html" class="side-menu-link">
          <img src="../../pictures/payment-icon.svg" alt="Payment Method">
          <span>Payment Method</span>
        </a>

        <a href="../pastOrders.html" class="side-menu-link">
          <img src="../../pictures/orders-icon.svg" alt="Past Orders">
          <span>Past Orders</span>
        </a>
      </nav>
    </aside>

        <main class="detail-page">
            <a href="../subway/Meals.html" class="back-link">
                <img src="../../pictures/back-arrow-icon.svg" alt="Back" class="back-icon">
                <span>Back</span>
            </a>

            <div class="detail-layout">
                <section class="detail-left">
                    <img src="../../pictures/turkeysub.jpg" alt="Turkey Sub" class="detail-meal-image">

                    <h1 class="detail-title">Turkey Sub Meal</h1>
                    <p class="detail-price">$7.99 | 460 cal</p>
                </section>

                <div class="size-section">

          <h3>Size Options:</h3>
          <div class="size-toggle">
            <a class="size-option">6-inch</a>
            <a class="size-option">Footlong</a>
          </div>

          <h3>Bread:</h3>
          <div class="size-toggle">
            <a class="size-option">White</a>
            <a class="size-option">Wheat</a>
          </div>
          <span></span>
                <section class="detail-right">
                    <h2 class="detail-section-title">Your Sandwich Includes:</h2>
                    <div class="detail-includes">
                        <div class="include-item">
                            <img src="../../pictures/greenpeppers.png" alt="Green Peppers" class="include-image">
                        </div>

                        <div class="include-item">
                            <img src="../../pictures/turkeyham.jpeg" alt="Turkey Ham" class="include-img">
                        </div>

                        <div class="include-item">
                            <img src="../../pictures/lettuce.jpg" alt="Lettuce" class="include-image">
                        </div>

                        <div class="include-item">
                            <img src="../../pictures/tomato.jpg" alt="Tomatos" class="include-image">
                        </div>

                    </div>

                    <div class="detail-tags">
                        <span class="detail-tag">Condiments</span>
                    </div>

                    <div class="addon-row">
                        <div class="addon-left">
                            <img src="../../pictures/ketchup.webp" alt="Ketchup" class="addon-image">
                            <span class="addon-name">Ketchup</span>
                        </div>

                        <button class="addon-button" type="button">
                            <img src="../../pictures/add-to-meal-icon.svg" alt="Add item">
                        </button>
                    </div>

                    <div class="addon-row">
                        <div class="addon-left">
                            <img src="../../pictures/mustard.webp" alt="Mustard" class="addon-image">
                            <span class="addon-name">Mustard</span>
                        </div>

                        <button class="addon-button" type="button">
                            <img src="../../pictures/add-to-meal-icon.svg" alt="Add item">
                        </button>
                    </div>

                    <div class="addon-row">
                        <div class="addon-left">
                            <img src="../../pictures/mayo.jfif" alt="Mayo" class="addon-image">
                            <span class="addon-name">Mayo</span>
                        </div>

                        <button class="addon-button" type="button">
                            <img src="../../pictures/add-to-meal-icon.svg" alt="Add item">
                        </button>
                    </div>

                    <a href="../subway/SideSelection.html" class="next-button">Next, choose a side</a>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
