<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Food Ordering</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../script.js" defer></script>
</head>
<body>
    <header class="top-bar">
        <a href="./index.html" class="topbar-logo">
            <img src="../pictures/charlotte-logo.png" alt="UNC Charlotte Dining Logo">
        </a>

        <nav class="desktop-nav">
            <a href="./index.html" class="active">Home</a>
            <a href="./profile.html">Profile</a>
            <a href="./paymentMethod.html">Payment Method</a>
            <a href="./pastOrders.html">Past Orders</a>
        </nav>

        <img class="dark-mode-icon" src="../pictures/dark-mode-button.svg" />
        <img class="menu-icon" id="menuOpen" src="../pictures/hamburger-menu-icon.svg" alt="Menu">
      </header>
    

    <div class="menu-overlay" id="menuOverlay"></div>

    <aside class="side-menu" id="sideMenu">
      <button class="menu-close" id="menuClose">
        <img src="../pictures/close-icon.svg" alt="Close">
      </button>

      <nav class="side-menu-nav">
        <a href="./index.html" class="side-menu-link">
          <img src="../pictures/home-icon.svg" alt="Homepage">
          <span>Homepage</span>
        </a>

        <a href="./profile.html" class="side-menu-link">
          <img src="../pictures/profile-icon.svg" alt="Profile">
          <span>Profile</span>
        </a>

        <a href="./paymentMethod.html" class="side-menu-link">
          <img src="../pictures/payment-icon.svg" alt="Payment Method">
          <span>Payment Method</span>
        </a>

        <a href="./pastOrders.html" class="side-menu-link">
          <img src="../pictures/orders-icon.svg" alt="Past Orders">
          <span>Past Orders</span>
        </a>
      </nav>
    </aside>

    <section class="search-section">
       
            <div class="search-bar autocomplete"> 
            <img src="../pictures/search-icon.png" alt="Search" class="search-icon">
            <input id="myInput" type="text" placeholder="Search" class="search-input">
        </div>
    </section>
    
    <main class="homepage">
        <section class="banner-section">
            <div class="banner-wrapper">
                <img class="banner-pic" src="../pictures/banner.png" alt="Promotional banner">
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Restaurants</h2>
            <div class="restaurant-grid">
                <a href="../screens/restaurantMenu.html"><img class="restaurant-logo" src="../pictures/bojangles-logo.svg" alt="Bojangles"></a>
                <img class="restaurant-logo" src="../pictures/wendys.png" alt="Wendy's">
                <img class="restaurant-logo" src="../pictures/chick.png" alt="Chick-fil-A">
                <img class="restaurant-logo" src="../pictures/subway.png" alt="Subway">
                <img class="restaurant-logo" src="../pictures/panda.jpg" alt="Panda Express">
                <img class="restaurant-logo" src="../pictures/halal.png" alt="Halal Shack">
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Locations</h2>
            <div class="location-grid">
                <img class="location-image" src="../pictures/union.jpg" alt="The Union">
                <img class="location-image" src="../pictures/prospector.jpg" alt="Prospector">
                <img class="location-image" src="../pictures/cone.webp" alt="Cone University Center">
                <img class="location-image" src="../pictures/fretwell.jpg" alt="Fretwell">
                <img class="location-image" src="../pictures/science.jpg" alt="Science Building">
            </div>
        </section>

        <section class="visit-grid">
            <div class="visit-card">
                <span class="visit-title">The Union</span>
                <img src="../pictures/forward-arrow-icon.svg" class="visit-arrow-icon" alt="Expand">
            </div>

            <div class="visit-card">
                <span class="visit-title">Prospector</span>
                <img src="../pictures/forward-arrow-icon.svg" class="visit-arrow-icon" alt="Expand">
            </div>

            <div class="visit-card">
                <span class="visit-title">Sovi</span>
                <img src="../pictures/forward-arrow-icon.svg" class="visit-arrow-icon" alt="Expand">
            </div>
        </section>
    </main>
</body>
</html>
