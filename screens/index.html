<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Food Ordering</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="top-bar">
        <img class="topbar-logo" src="../pictures/charlotte-logo.png" alt="UNC Charlotte Dining Logo">
        <img class="dark-mode-icon" src="../pictures/dark-mode-button.svg" alt="Dark Mode">
        <img class="menu-icon" src="../pictures/hamburger-menu-icon.svg" alt="Menu">
    </header>
    
    <main class="homepage">
        <section class="banner-section">
            <div class="banner-wrapper">
                <img class="banner-pic" src="../pictures/banner.png" alt="Promotional banner">
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Restaurants</h2>
            <div class="restaurant-grid">
                <img class="restaurant-logo" src="../pictures/bojangles-logo.svg" alt="Bojangles">
                <img class="restaurant-logo" src="../pictures/wendys-logo.png" alt="Wendy's">
                <img class="restaurant-logo" src="../pictures/chickfila-logo.png" alt="Chick-fil-A">
                <img class="restaurant-logo" src="../pictures/subway-logo.png" alt="Subway">
                <img class="restaurant-logo" src="../pictures/pandaexpress-logo.jpg" alt="Panda Express">
                <img class="restaurant-logo" src="../pictures/halalshack-logo.png" alt="Halal Shack">
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Locations</h2>
            <div class="location-grid">
                <img class="location-image" src="../pictures/union.jpg" alt="The Union">
                <img class="location-image" src="../pictures/prospector.jpg" alt="Prospector">
                <img class="location-image" src="../pictures/cone.webp" alt="Cone University Center">
                <img class="location-image" src="../pictures/fretwell.jpg" alt="Fretwell">
                <img class="location-image" src="../pictures/science.jpg" alt="Science Building">
            </div>
        </section>

        <section class="visit-grid">
            <div class="visit-card">
                <span class="visit-title">The Union</span>
                <img src="../pictures/forward-arrow-icon.svg" class="visit-arrow-icon" alt="Expand">
            </div>

            <div class="visit-card">
                <span class="visit-title">Prospector</span>
                <img src="../pictures/forward-arrow-icon.svg" class="visit-arrow-icon" alt="Expand">
            </div>

            <div class="visit-card">
                <span class="visit-title">Sovi</span>
                <img src="../pictures/forward-arrow-icon.svg" class="visit-arrow-icon" alt="Expand">
            </div>
        </section>
    </main>
</body>
</html>
