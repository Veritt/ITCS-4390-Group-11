<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style.css" />
    <script src="../script.js" defer></script>
    <title>Dining Locations</title>
  </head>

  <body>
    <div class="restaurant-menu">

      <!-- TOP BAR -->
      <header class="top-bar">
        <img class="topbar-logo" src="../pictures/charlotte-logo.png" />
        <img class="dark-mode-icon" src="../pictures/dark-mode-button.svg" />
        <img class="menu-icon" id="menuOpen" src="../pictures/hamburger-menu-icon.svg" alt="Menu">
      </header>

      <!-- Hamburger Menu-->
      <div class="menu-overlay" id="menuOverlay"></div>

    <aside class="side-menu" id="sideMenu" aria-hidden="true">
      <button class="menu-close" id="menuClose" aria-label="Close menu">
        <img src="../pictures/close-icon.svg" alt="Close">
      </button>

      <nav class="side-menu-nav">
        <a href="./index.html" class="side-menu-link">
          <img src="../pictures/home-icon.svg" alt="Homepage">
          <span>Homepage</span>
        </a>

        <a href="./profile.html" class="side-menu-link">
          <img src="../pictures/profile-icon.svg" alt="Profile">
          <span>Profile</span>
        </a>

        <a href="./paymentMethod.html" class="side-menu-link">
          <img src="../pictures/payment-icon.svg" alt="Payment Method">
          <span>Payment Method</span>
        </a>

        <a href="./pastOrders.html" class="side-menu-link">
          <img src="../pictures/orders-icon.svg" alt="Past Orders">
          <span>Past Orders</span>
        </a>
      </nav>
    </aside>

      <!-- PAGE CONTENT -->
      <div class="locations-page">

        <h2>Dining Locations</h2>

        <!-- LOCATION 1 -->
        <div class="location-item">
          <div class="location-left">
            <img src="../pictures/bojangles-logo.svg" class="location-logo" />
            <div class="location-text">
              <h3>Bojangles</h3>
              <p>Student Union</p>
            </div>
          </div>
          <img src="../pictures/arrow-down-.webp" class="arrow-icon" />
        </div>

        <!-- LOCATION 2 -->
        <div class="location-item">
          <div class="location-left">
            <img src="../pictures/subway.png" class="location-logo" />
            <div class="location-text">
              <h3>Subway</h3>
              <p>Cone University Center</p>
            </div>
          </div>
          <img src="../pictures/arrow-down-.webp" class="arrow-icon" />
        </div>

      </div>
    </div>
  </body>
</html>
